name: Desktop Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  desktop_windows:
    name: Build and publish Windows desktop zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Gradle wrapper JAR
        shell: bash
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.14.4/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: false

      - name: Derive desktop release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import re
          from datetime import datetime
          from zoneinfo import ZoneInfo

          gradle_text = pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8")
          version_match = re.search(r'appVersionName\s*=\s*providers\.gradleProperty\("NOVEO_VERSION_NAME"\)\.orNull \?: "([^"]+)"', gradle_text)
          if not version_match:
              version_match = re.search(r'versionName\s*=\s*"([^"]+)"', gradle_text)
          base_version = version_match.group(1).strip() if version_match else "1.0.0"

          existing_tags = set()
          try:
              import subprocess
              tags = subprocess.check_output(["git", "tag", "--list"], text=True)
              existing_tags = {tag.strip() for tag in tags.splitlines() if tag.strip()}
          except Exception:
              pass

          if base_version in existing_tags:
              stamp = datetime.now(ZoneInfo("Asia/Tehran")).strftime("%-m%d%H%M")
              tag = f"{base_version}-{stamp}"
              prerelease = "true"
          else:
              tag = base_version
              prerelease = "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"tag={tag}\n")
              fh.write(f"prerelease={prerelease}\n")
              fh.write(f"release_name=Noveo {tag}\n")
          PY

      - name: Build thin desktop distributable
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --build-cache --configuration-cache :desktopApp:createThinDesktopZip

      - name: Collect desktop zip
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          find desktopApp/build/compose/binaries -maxdepth 4 -type f -print
          cp desktopApp/build/compose/binaries/thin/*.zip "dist/noveo-${RELEASE_TAG}-windows-x64-thin.zip"
          ls -lh dist
          test -f "dist/noveo-${RELEASE_TAG}-windows-x64-thin.zip"

      - name: Upload desktop workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-thin
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish desktop zip to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          body: |
            Windows desktop thin package.

            This zip uses system Java instead of bundling a JVM runtime.
          files: dist/*.zip
