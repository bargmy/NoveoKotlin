name: Android Build And Deliver

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APK_FOLDER: app/build/outputs/apk/release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Prepare Gradle command
        id: gradle_cmd
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "cmd=./gradlew" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=gradle" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive release metadata
        id: release_meta
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          gradle_text = pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8")

          version_match = re.search(r'appVersionName\s*=\s*providers\.gradleProperty\("NOVEO_VERSION_NAME"\)\.orNull \?: "([^"]+)"', gradle_text)
          if not version_match:
              version_match = re.search(r'versionName\s*=\s*"([^"]+)"', gradle_text)
          if not version_match:
              raise SystemExit("Could not find base versionName in app/build.gradle.kts")

          version_code_match = re.search(r'appVersionCode\s*=\s*providers\.gradleProperty\("NOVEO_VERSION_CODE"\)\.orNull\?\.toIntOrNull\(\) \?: (\d+)', gradle_text)
          if not version_code_match:
              version_code_match = re.search(r'versionCode\s*=\s*(\d+)', gradle_text)
          if not version_code_match:
              raise SystemExit("Could not find base versionCode in app/build.gradle.kts")

          base_version = version_match.group(1).strip()
          base_version_code = int(version_code_match.group(1))

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          latest_release_tag = ""
          latest_stable_tag = ""
          try:
              with urllib.request.urlopen(req) as resp:
                  releases = json.load(resp)
              for release in releases:
                  if release.get("draft"):
                      continue
                  if not latest_release_tag:
                      latest_release_tag = (release.get("tag_name") or "").strip()
                  if release.get("prerelease"):
                      continue
                  tag_name = (release.get("tag_name") or "").strip()
                  if re.fullmatch(r"\d+\.\d+\.\d+", tag_name):
                      latest_stable_tag = tag_name
                      break
          except Exception:
              latest_release_tag = ""
              latest_stable_tag = ""

          is_prerelease = base_version == latest_stable_tag
          if is_prerelease:
              stamp = datetime.now(ZoneInfo("Asia/Tehran")).strftime("%-m%d%H%M")
              effective_version = f"{base_version}.{stamp}"
              version_code = int(stamp)
              tag = f"{base_version}-{stamp}"
              prerelease = "true"
              release_name = f"Noveo {tag}"
          else:
              stamp = ""
              effective_version = base_version
              version_code = base_version_code
              tag = base_version
              prerelease = "false"
              release_name = f"Noveo {base_version}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"base_version={base_version}\n")
              fh.write(f"version={effective_version}\n")
              fh.write(f"version_code={version_code}\n")
              fh.write(f"stamp={stamp}\n")
              fh.write(f"tag={tag}\n")
              fh.write(f"prerelease={prerelease}\n")
              fh.write(f"release_name={release_name}\n")
              fh.write(f"latest_release_tag={latest_release_tag}\n")
              fh.write(f"latest_stable_tag={latest_stable_tag}\n")
          PY

      - name: Build release APK
        id: build_apk
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          "${{ steps.gradle_cmd.outputs.cmd }}" \
            --build-cache \
            --configuration-cache \
            -PNOVEO_VERSION_NAME="${{ steps.release_meta.outputs.version }}" \
            -PNOVEO_VERSION_CODE="${{ steps.release_meta.outputs.version_code }}" \
            assembleRelease 2>&1 | tee build.log

      - name: Sign APK
        if: steps.build_apk.outcome == 'success'
        shell: bash
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          SIGN_KEYSTORE_PASSWORD: ${{ secrets.SIGN_KEYSTORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGN_KEYSTORE_BASE64}" ]; then
            echo "SIGN_KEYSTORE_BASE64 is empty, skipping signing."
            exit 0
          fi

          echo "$SIGN_KEYSTORE_BASE64" | base64 -d > release.keystore
          BUILD_TOOLS_DIR="$(ls -d "${ANDROID_SDK_ROOT}"/build-tools/* | sort -V | tail -n 1)"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"
          ZIPALIGN="${BUILD_TOOLS_DIR}/zipalign"
          APK_PATH="$(find "$APK_FOLDER" -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "No APK found to sign." >&2
            exit 1
          fi

          "$ZIPALIGN" -f -v 4 "$APK_PATH" aligned.apk
          "$APKSIGNER" sign \
            --ks release.keystore \
            --ks-pass pass:"$SIGN_KEYSTORE_PASSWORD" \
            --ks-key-alias "$SIGN_KEY_ALIAS" \
            --key-pass pass:"$SIGN_KEY_PASSWORD" \
            --out signed.apk aligned.apk

          mv signed.apk "$APK_PATH"

      - name: Upload build log artifact on failure
        if: steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore

      - name: Notify Telegram on build failure
        if: steps.build_apk.outcome == 'failure'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHANNEL_ID }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram failure notification is not configured, skipping."
            exit 0
          fi

          python3 - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          repo = os.environ["REPO"]
          ref_name = os.environ["REF_NAME"]
          sha = os.environ["SHA"][:7]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['RUN_ID']}"
          log_text = ""
          log_file = pathlib.Path("build.log")
          if log_file.exists():
              lines = log_file.read_text(errors="ignore").strip().splitlines()
              log_text = "\n".join(lines[-35:])[-3200:]
          message = f"Android release build failed\nrepo: {repo}\nbranch: {ref_name}\ncommit: {sha}\nrun: {run_url}"
          if log_text:
              message += f"\n\nLast log lines:\n{log_text}"
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": message}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
          urllib.request.urlopen(req).read()
          PY

      - name: Fail workflow after failure notifications
        if: steps.build_apk.outcome == 'failure'
        run: exit 1

      - name: Find built APK
        id: find_apk
        shell: bash
        run: |
          APK_PATH="$(find "$APK_FOLDER" -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in $APK_FOLDER" >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Groq Diffgen
        id: changelog
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          RELEASE_PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
          PREVIOUS_RELEASE_TAG: ${{ steps.release_meta.outputs.latest_release_tag }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          PREV_TAG="${PREVIOUS_RELEASE_TAG}"
          if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG^{commit}" >/dev/null 2>&1; then
            RANGE="${PREV_TAG}..${GITHUB_SHA}"
            PREV_LABEL="$PREV_TAG"
          elif git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
            RANGE="${GITHUB_SHA}^..${GITHUB_SHA}"
            PREV_LABEL="${GITHUB_SHA}^"
          else
            RANGE="${GITHUB_SHA}"
            PREV_LABEL="initial build"
          fi

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "previous_label=${PREV_LABEL}"
            echo "range=${RANGE}"
          } >> "$GITHUB_OUTPUT"

          git log --no-merges --pretty=format:'- %s (%h)' "$RANGE" > commits.txt || true
          git diff --name-status "$RANGE" > files.txt || true
          export PREV_LABEL RANGE
          python3 -m pip install --disable-pip-version-check --quiet groq

          python3 - <<'PY'
          import os
          import pathlib
          import sys
          import textwrap
          from groq import Groq

          release_tag = os.environ["RELEASE_TAG"]
          release_version = os.environ["RELEASE_VERSION"]
          prerelease = os.environ["RELEASE_PRERELEASE"] == "true"
          previous_label = os.environ["PREV_LABEL"]
          range_text = os.environ["RANGE"]
          api_key = os.environ.get("GROQ_API_KEY", "").strip()

          commits = pathlib.Path("commits.txt").read_text(encoding="utf-8", errors="ignore").strip()
          files_changed = pathlib.Path("files.txt").read_text(encoding="utf-8", errors="ignore").strip()
          if not commits:
              commits = "- No commit messages available"
          if not files_changed:
              files_changed = "No file-level diff available"

          fallback = textwrap.dedent(f"""\
          Release {release_tag}

          Diff since {previous_label}.

          Commits:
          {commits}

          Files changed:
          {files_changed}
          """).strip()

          if not api_key:
              body = fallback
          else:
              system_prompt = (
                  "You write concise software release notes for Android builds. "
                  "Return plain Markdown only. Be factual, do not invent behavior, "
                  "and summarize only what is supported by the provided diff. "
                  "Keep the result under 900 characters so the exact same text can be reused "
                  "for GitHub Releases and message captions."
              )
              user_prompt = textwrap.dedent(f"""\
              Build type: {"pre-release" if prerelease else "release"}
              New release tag: {release_tag}
              App versionName: {release_version}
              Diff range: {range_text}
              Previous successful release: {previous_label}

              Commit summaries:
              {commits}

              File diff:
              {files_changed}

              Write a compact changelog with:
              - a one-line headline
              - 2 to 5 short bullets
              - no hype
              - no unsupported claims
              """)
              try:
                  client = Groq(api_key=api_key)
                  completion = client.chat.completions.create(
                      model="openai/gpt-oss-120b",
                      reasoning_effort="medium",
                      messages=[
                          {"role": "system", "content": system_prompt},
                          {"role": "user", "content": user_prompt},
                      ],
                  )
                  body = (completion.choices[0].message.content or "").strip()
                  if not body:
                      raise RuntimeError("Groq returned an empty changelog response")
              except Exception as exc:
                  print(f"Groq diffgen failed: {exc}", file=sys.stderr)
                  raise

          pathlib.Path("release-notes.md").write_text(body + "\n", encoding="utf-8")
          pathlib.Path("release-caption.txt").write_text(body[:900], encoding="utf-8")
          PY

      - name: Rename APK for release
        id: rename_apk
        shell: bash
        env:
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail
          RELEASE_APK_PATH="$(dirname "$APK_PATH")/noveo-${RELEASE_TAG}.apk"
          mv "$APK_PATH" "$RELEASE_APK_PATH"
          echo "apk_path=$RELEASE_APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$RELEASE_APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.rename_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          body_path: release-notes.md
          files: ${{ steps.rename_apk.outputs.apk_path }}

      - name: Send APK to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHANNEL_ID }}
          APK_PATH: ${{ steps.rename_apk.outputs.apk_path }}
          APK_NAME: ${{ steps.rename_apk.outputs.apk_name }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram delivery is not configured, skipping."
            exit 0
          fi

          CAPTION="$(cat release-caption.txt)"
          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK_PATH};filename=${APK_NAME}" \
            -F "caption=${CAPTION}"

      - name: Send APK to Bale through proxy
        shell: bash
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_TOKEN }}
          PROXY_IP: ${{ secrets.PROXY_IP }}
          APK_PATH: ${{ steps.rename_apk.outputs.apk_path }}
          APK_NAME: ${{ steps.rename_apk.outputs.apk_name }}
        run: |
          BALE_BOT_TOKEN_CLEAN="$(printf '%s' "${BALE_BOT_TOKEN}" | tr -d '\r\n[:space:]')"
          PROXY_IP_CLEAN="$(printf '%s' "${PROXY_IP}" | tr -d '\r\n[:space:]')"

          if [ -z "${BALE_BOT_TOKEN_CLEAN}" ] || [ -z "${PROXY_IP_CLEAN}" ]; then
            echo "Proxy delivery is not configured, skipping."
            exit 0
          fi

          CAPTION="$(cat release-caption.txt)"
          RESPONSE="$(
            curl --silent --show-error \
              -X POST "http://${PROXY_IP_CLEAN}:8787/upload-apk" \
              -H "X-Bot-Token: ${BALE_BOT_TOKEN_CLEAN}" \
              -F "document=@${APK_PATH};filename=${APK_NAME}" \
              -F "caption=${CAPTION}"
          )"

          echo "Proxy response:"
          echo "${RESPONSE}"

          if ! echo "${RESPONSE}" | python3 -c "import sys, json; print(json.load(sys.stdin).get('ok', False))" | grep -q "True"; then
            echo "Proxy upload failed according to response JSON." >&2
            exit 1
          fi
