name: Android Build And Deliver

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APK_FOLDER: app/build/outputs/apk/release
      DRIVE_META_NAME: .noveo-latest-apk.json
      RCLONE_REMOTE: gdrive
      RCLONE_DIR: NoveoKotlin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle command
        id: gradle_cmd
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "cmd=./gradlew" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=gradle" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        id: build_apk
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          "${{ steps.gradle_cmd.outputs.cmd }}" assembleRelease 2>&1 | tee build.log

      - name: Sign APK
        if: steps.build_apk.outcome == 'success'
        shell: bash
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          SIGN_KEYSTORE_PASSWORD: ${{ secrets.SIGN_KEYSTORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGN_KEYSTORE_BASE64}" ]; then
            echo "SIGN_KEYSTORE_BASE64 is empty, skipping signing."
            exit 0
          fi

          echo "$SIGN_KEYSTORE_BASE64" | base64 -d > release.keystore
          BUILD_TOOLS_DIR="$(ls -d "${ANDROID_SDK_ROOT}"/build-tools/* | sort -V | tail -n 1)"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"
          ZIPALIGN="${BUILD_TOOLS_DIR}/zipalign"
          APK_PATH="$(find "$APK_FOLDER" -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "No APK found to sign." >&2
            exit 1
          fi

          "$ZIPALIGN" -f -v 4 "$APK_PATH" aligned.apk
          "$APKSIGNER" sign \
            --ks release.keystore \
            --ks-pass pass:"$SIGN_KEYSTORE_PASSWORD" \
            --ks-key-alias "$SIGN_KEY_ALIAS" \
            --key-pass pass:"$SIGN_KEY_PASSWORD" \
            --out signed.apk aligned.apk

          mv signed.apk "$APK_PATH"

      - name: Upload build log artifact on failure
        if: steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore

      - name: Notify Telegram on build failure
        if: steps.build_apk.outcome == 'failure'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHANNEL_ID }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram failure notification is not configured, skipping."
            exit 0
          fi

          python3 - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          repo = os.environ["REPO"]
          ref_name = os.environ["REF_NAME"]
          sha = os.environ["SHA"][:7]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['RUN_ID']}"
          log_text = ""
          log_file = pathlib.Path("build.log")
          if log_file.exists():
              lines = log_file.read_text(errors="ignore").strip().splitlines()
              log_text = "\n".join(lines[-35:])[-3200:]
          message = f"❌ Android release build failed\nrepo: {repo}\nbranch: {ref_name}\ncommit: {sha}\nrun: {run_url}"
          if log_text:
              message += f"\n\nLast log lines:\n{log_text}"
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": message}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
          urllib.request.urlopen(req).read()
          PY

      - name: Fail workflow after failure notifications
        if: steps.build_apk.outcome == 'failure'
        run: exit 1

      - name: Find built APK
        id: find_apk
        shell: bash
        run: |
          APK_PATH="$(find "$APK_FOLDER" -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in $APK_FOLDER" >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Install rclone
        shell: bash
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          if [ -z "${RCLONE_CONFIG}" ]; then
            echo "RCLONE_CONFIG is empty, skipping rclone install."
            exit 0
          fi
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Write rclone config from secret
        shell: bash
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          if [ -z "${RCLONE_CONFIG}" ]; then
            echo "RCLONE_CONFIG is empty, skipping rclone config."
            exit 0
          fi
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<'EOF'
          ${{ secrets.RCLONE_CONFIG }}
          EOF

      - name: Upload APK to Google Drive via rclone
        id: drive_upload
        shell: bash
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
          APK_NAME: ${{ steps.find_apk.outputs.apk_name }}
          DRIVE_META_NAME: ${{ env.DRIVE_META_NAME }}
          RCLONE_REMOTE: ${{ env.RCLONE_REMOTE }}
          RCLONE_DIR: ${{ env.RCLONE_DIR }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${RCLONE_CONFIG}" ]; then
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            echo "sha256=$(sha256sum "$APK_PATH" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
            echo "drive_link=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sha256_value="$(sha256sum "$APK_PATH" | awk '{print $1}')"
          meta_remote="${RCLONE_REMOTE}:${RCLONE_DIR}/${DRIVE_META_NAME}"
          existing_meta=""
          if rclone lsjson "$meta_remote" >/dev/null 2>&1; then
            existing_meta="$(rclone cat "$meta_remote" 2>/dev/null || true)"
          fi

          existing_hash=""
          existing_link=""
          if [ -n "$existing_meta" ]; then
            existing_hash="$(printf '%s' "$existing_meta" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get(\"sha256\", \"\"))' 2>/dev/null || true)"
            existing_link="$(printf '%s' "$existing_meta" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get(\"drive_link\", \"\"))' 2>/dev/null || true)"
          fi

          if [ "$existing_hash" = "$sha256_value" ] && [ -n "$existing_link" ]; then
            {
              echo "uploaded=false"
              echo "sha256=$sha256_value"
              echo "drive_link=$existing_link"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          timestamp="$(date -u +%Y%m%d-%H%M%S)"
          short_sha="${GITHUB_SHA:0:7}"
          file_name="release-${GITHUB_REF_NAME}-${short_sha}-${timestamp}.apk"
          remote_dir="${RCLONE_REMOTE}:${RCLONE_DIR}"
          remote_apk="${remote_dir}/${file_name}"
          drive_run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          rclone mkdir "$remote_dir"
          rclone copyto "$APK_PATH" "$remote_apk"
          drive_link="$(rclone link "$remote_apk")"

          meta_file="$(mktemp)"
          cat > "$meta_file" <<EOF
          {
            "sha256": "$sha256_value",
            "file_name": "$file_name",
            "drive_link": "$drive_link",
            "commit_sha": "$GITHUB_SHA",
            "branch": "$GITHUB_REF_NAME",
            "run_url": "$drive_run_url",
            "uploaded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          rclone copyto "$meta_file" "$meta_remote"
          rm -f "$meta_file"

          {
            echo "uploaded=true"
            echo "sha256=$sha256_value"
            echo "drive_link=$drive_link"
          } >> "$GITHUB_OUTPUT"

      - name: Send APK to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHANNEL_ID }}
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
          APK_NAME: ${{ steps.find_apk.outputs.apk_name }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          DRIVE_LINK: ${{ steps.drive_upload.outputs.drive_link }}
          APK_HASH: ${{ steps.drive_upload.outputs.sha256 }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram delivery is not configured, skipping."
            exit 0
          fi

          SHORT_SHA="${SHA:0:7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          CAPTION=$(cat <<EOF
          ✅ New Android APK build
          repo: ${REPO}
          branch: ${REF_NAME}
          commit: ${SHORT_SHA}
          sha256: ${APK_HASH:-unknown}
          ${DRIVE_LINK:+drive: ${DRIVE_LINK}}
          run: ${RUN_URL}
          EOF
          )

          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK_PATH};filename=${APK_NAME}" \
            -F "caption=${CAPTION}"

      - name: Send APK to Bale through proxy
        shell: bash
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_TOKEN }}
          PROXY_IP: ${{ secrets.PROXY_IP }}
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
          APK_NAME: ${{ steps.find_apk.outputs.apk_name }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          DRIVE_LINK: ${{ steps.drive_upload.outputs.drive_link }}
          APK_HASH: ${{ steps.drive_upload.outputs.sha256 }}
        run: |
          BALE_BOT_TOKEN_CLEAN="$(printf '%s' "${BALE_BOT_TOKEN}" | tr -d '\r\n[:space:]')"
          PROXY_IP_CLEAN="$(printf '%s' "${PROXY_IP}" | tr -d '\r\n[:space:]')"

          if [ -z "${BALE_BOT_TOKEN_CLEAN}" ] || [ -z "${PROXY_IP_CLEAN}" ]; then
            echo "Proxy delivery is not configured, skipping."
            exit 0
          fi

          SHORT_SHA="${SHA:0:7}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          CAPTION=$(cat <<EOF
          ✅ نسخه جدید نوعو کوطلین بیلد  شد!
          کامیت: ${SHORT_SHA}
          هش: ${APK_HASH:-unknown}
          گیتهاب: ${RUN_URL}
          EOF
          )

          RESPONSE="$(
            curl --silent --show-error \
              -X POST "http://${PROXY_IP_CLEAN}:8787/upload-apk" \
              -H "X-Bot-Token: ${BALE_BOT_TOKEN_CLEAN}" \
              -F "document=@${APK_PATH};filename=${APK_NAME}" \
              -F "caption=${CAPTION}"
          )"

          echo "Proxy response:"
          echo "${RESPONSE}"

          if ! echo "${RESPONSE}" | grep -q '"ok":true'; then
            echo "Proxy upload failed." >&2
            exit 1
          fi

      - name: Clean up rclone config
        if: always()
        run: rm -f ~/.config/rclone/rclone.conf
