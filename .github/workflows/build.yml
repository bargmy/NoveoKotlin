name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APK_FOLDER: app/build/outputs/apk/release
      DRIVE_META_NAME: .noveo-latest-apk.json
      RCLONE_REMOTE: gdrive
      RCLONE_DIR: NoveoKotlin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build release APK
        id: build_apk
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle assembleRelease 2>&1 | tee build.log

      - name: Sign APK
        if: steps.build_apk.outcome == 'success'
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          SIGN_KEYSTORE_PASSWORD: ${{ secrets.SIGN_KEYSTORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
        run: |
          if [ -z "$SIGN_KEYSTORE_BASE64" ]; then
            echo "SIGN_KEYSTORE_BASE64 is empty, skipping signing."
            exit 0
          fi
          echo "$SIGN_KEYSTORE_BASE64" | base64 -d > release.keystore
          
          # Find build tools
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -n 1)
          APKSIGNER=$BUILD_TOOLS_DIR/apksigner
          ZIPALIGN=$BUILD_TOOLS_DIR/zipalign
          
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          $ZIPALIGN -f -v 4 "$APK_PATH" aligned.apk
          $APKSIGNER sign --ks release.keystore \
            --ks-pass pass:"$SIGN_KEYSTORE_PASSWORD" \
            --ks-key-alias "$SIGN_KEY_ALIAS" \
            --key-pass pass:"$SIGN_KEY_PASSWORD" \
            --out signed.apk aligned.apk
            
          # Overwrite original APK so subsequent steps use the signed one
          mv signed.apk "$APK_PATH"

      - name: Upload build log artifact on failure
        if: steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore

      - name: Send build failure to Telegram
        if: steps.build_apk.outcome == 'failure'
        shell: bash
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import urllib.parse
          import urllib.request

          token = os.environ['TOKEN']
          chat_id = os.environ['CHANNEL_ID']
          repo = os.environ['REPO']
          ref_name = os.environ['REF_NAME']
          sha = os.environ['SHA'][:7]
          run_id = os.environ['RUN_ID']
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"
          log_text = ''
          log_file = pathlib.Path('build.log')
          if log_file.exists():
              lines = log_file.read_text(errors='ignore').strip().splitlines()
              log_text = '\n'.join(lines[-35:])[-3200:]
          message = f"❌ NoveoKotlin release build failed\nrepo: {repo}\nbranch: {ref_name}\ncommit: {sha}\nrun: {run_url}"
          if log_text:
              message += f"\n\nLast log lines:\n{log_text}"
          data = urllib.parse.urlencode({'chat_id': chat_id, 'text': message}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
          urllib.request.urlopen(req).read()
          PY

      - name: Fail workflow after Telegram failure notice
        if: steps.build_apk.outcome == 'failure'
        run: exit 1

      - name: Find built APK
        id: find_apk
        shell: bash
        run: |
          APK_PATH=$(find "$APK_FOLDER" -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in $APK_FOLDER" >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: noveo-release-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Write rclone config from secret
        shell: bash
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<'EOF'
          ${{ secrets.RCLONE }}
          EOF

      - name: Make rclone upload helper executable
        run: chmod +x scripts/ci/upload_apk_with_rclone.sh

      - name: Upload unique APK to Google Drive via rclone
        id: drive_upload
        env:
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
          APK_NAME: ${{ steps.find_apk.outputs.apk_name }}
          DRIVE_META_NAME: ${{ env.DRIVE_META_NAME }}
          RCLONE_REMOTE: ${{ env.RCLONE_REMOTE }}
          RCLONE_DIR: ${{ env.RCLONE_DIR }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/ci/upload_apk_with_rclone.sh

      - name: Notify Telegram on fresh APK upload
        if: steps.drive_upload.outputs.uploaded == 'true'
        shell: bash
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          DRIVE_LINK: ${{ steps.drive_upload.outputs.drive_link }}
          APK_HASH: ${{ steps.drive_upload.outputs.sha256 }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.parse
          import urllib.request

          token = os.environ['TOKEN']
          chat_id = os.environ['CHANNEL_ID']
          repo = os.environ['REPO']
          sha = os.environ['SHA'][:7]
          drive_link = os.environ['DRIVE_LINK']
          apk_hash = os.environ['APK_HASH']
          run_id = os.environ['RUN_ID']
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"
          message = (
              "✅ نسخه جدید نوعو کوطلین با موفقیت بیلد شد!\n"
              f"commit: {sha}\n"
              f"sha256: {apk_hash}\n"
              f"drive: {drive_link}\n"
              f"run: {run_url}"
          )
          data = urllib.parse.urlencode({'chat_id': chat_id, 'text': message}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
          urllib.request.urlopen(req).read()
          PY

      - name: Notify Bale on fresh APK upload
        if: steps.drive_upload.outputs.uploaded == 'true'
        shell: bash
        env:
          BALE_TOKEN: ${{ secrets.BALE_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          APK_HASH: ${{ steps.drive_upload.outputs.sha256 }}
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.parse
          import urllib.request
          import mimetypes

          token = os.environ.get('BALE_TOKEN')
          if not token:
              print("BALE_TOKEN missing")
              exit(0)
          
          # Use @noveo as per user's correction
          chat_id = "@noveo"
          
          sha = os.environ['SHA'][:7]
          apk_hash = os.environ['APK_HASH']
          apk_path = os.environ['APK_PATH']
          run_id = os.environ['RUN_ID']
          repo = os.environ['REPO']
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          message = (
              "✅ نسخه جدید نوعو کوطلین با موفقیت بیلد شد!\n"
              f"commit: {sha}\n"
              f"sha256: {apk_hash}\n"
              f"run: {run_url}"
          )
          
          url = f"https://tapi.bale.ai/bot{token}/sendDocument"
          
          def send_file(url, chat_id, file_path, caption):
              boundary = '----WebKitFormBoundary7MA4YWxkTrZu0gW'
              filename = os.path.basename(file_path)
              mime_type = mimetypes.guess_type(file_path)[0] or 'application/octet-stream'
              
              with open(file_path, 'rb') as f:
                  content = f.read()
              
              parts = []
              parts.append(f'--{boundary}\r\nContent-Disposition: form-data; name="chat_id"\r\n\r\n{chat_id}\r\n'.encode())
              parts.append(f'--{boundary}\r\nContent-Disposition: form-data; name="caption"\r\n\r\n{caption}\r\n'.encode())
              parts.append(f'--{boundary}\r\nContent-Disposition: form-data; name="document"; filename="{filename}"\r\nContent-Type: {mime_type}\r\n\r\n'.encode())
              parts.append(content)
              parts.append(f'\r\n--{boundary}--\r\n'.encode())
              
              body = b''.join(parts)
              
              req = urllib.request.Request(url, data=body)
              req.add_header('Content-Type', f'multipart/form-data; boundary={boundary}')
              return urllib.request.urlopen(req).read()

          try:
              send_file(url, chat_id, apk_path, message)
              print("Successfully sent to Bale")
          except Exception as e:
              print(f"Failed to send to Bale: {e}")
          PY

      - name: Clean up rclone config
        if: always()
        run: rm -f ~/.config/rclone/rclone.conf
